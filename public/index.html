<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Book Your Intro Class — World Class Martial Arts</title>
<style>
:root{--brand:#3073F1;--ink:#1e293b;--muted:#64748b;--line:#e5e7eb;--bg:#f5f7fb}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(16,24,40,.06);margin-top:16px}
h1{font-size:22px;margin:0}.sub{color:var(--muted);font-size:14px;margin-top:6px}
label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff}
.progs{display:grid;gap:10px}.prog{border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.prog.sel{border-color:var(--brand);box-shadow:0 0 0 2px rgba(48,115,241,.15)}.prog b{font-size:15px}.prog .tag{color:var(--muted);font-size:12px}.prog .price{font-weight:700;color:var(--brand)}
.row{display:flex;gap:10px}.row>div{flex:1}
button.cta{width:100%;margin-top:20px;padding:14px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-size:16px;font-weight:700;cursor:pointer}button.cta:disabled{opacity:.5}
.brand{display:flex;align-items:center;gap:10px}.logo{width:40px;height:40px;border-radius:10px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.err{color:#e63535;font-size:13px;margin-top:10px}.note{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
</style></head><body><div class="wrap">
<div class="brand"><div class="logo">WCMA</div><div><h1>Book Your Intro Class</h1><div class="sub">World Class Martial Arts</div></div></div>
<div class="card"><label>Choose a program</label><div class="progs" id="progs"></div>
<div class="row"><div><label>Preferred date</label><input type="date" id="date"/></div>
<div><label>Preferred time</label><select id="time"><option>10:00 AM</option><option>11:00 AM</option><option>4:00 PM</option><option>5:00 PM</option><option>6:00 PM</option></select></div></div>
<label>Student name</label><input id="student" placeholder="Full name"/>
<div class="row"><div><label>Age</label><input id="age" type="number" min="3" max="99" placeholder="e.g. 8"/></div>
<div><label>Parent/Guardian (if a minor)</label><input id="guardian" placeholder="Optional"/></div></div>
<label>Email</label><input id="email" type="email" placeholder="you@email.com"/>
<label>Phone</label><input id="phone" type="tel" placeholder="(555) 123-4567"/>
<div class="err" id="err"></div><button class="cta" id="submit">Book my intro</button>
<div class="note">You'll get a confirmation right away. Payment (if any) is handled securely by Stripe.</div></div></div>
<script>
let PROGRAMS=[],selected=null;const SRC=new URLSearchParams(location.search).get('src')||'direct';
fetch('/api/programs').then(r=>r.json()).then(list=>{PROGRAMS=list;
document.getElementById('progs').innerHTML=list.map(p=>'<div class="prog" data-id="'+p.id+'"><div><b>'+p.name+'</b><div class="tag">'+p.tag+' &middot; '+p.dur+' min</div></div><div class="price">'+(p.price?'$'+(p.price/100).toFixed(2):'Free')+'</div></div>').join('');
document.querySelectorAll('.prog').forEach(el=>el.onclick=()=>{document.querySelectorAll('.prog').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');selected=el.dataset.id;});});
document.getElementById('submit').onclick=async()=>{const err=document.getElementById('err');err.textContent='';const g=id=>document.getElementById(id).value.trim();
if(!selected)return err.textContent='Please choose a program.';if(!g('student')||!g('email')||!g('phone'))return err.textContent='Please fill in name, email, and phone.';
const when=(g('date')||'(date TBD)')+' · '+g('time');const btn=document.getElementById('submit');btn.disabled=true;btn.textContent='Booking...';
try{const res=await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({programId:selected,student:g('student'),age:g('age'),guardian:g('guardian'),email:g('email'),phone:g('phone'),when,source:SRC})});
const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');if(data.pay&&data.checkoutUrl){location.href=data.checkoutUrl;return;}location.href='/success';}
catch(e){err.textContent=e.message;btn.disabled=false;btn.textContent='Book my intro';}};
</script></body></html>
